---
# MySQL TCP proxy deployment.
#
# Sits between Traefik TCP (:3306) and vtgate (:3306), enforcing IP
# whitelists before forwarding MySQL connections.
#
# Architecture:
#   Client → Traefik TCP (:3306) → mysql-proxy Service → mysql-proxy Pod → vtgate Service (:3306)
#
apiVersion: v1
kind: Service
metadata:
  name: mysql-proxy
  namespace: euroscale
  labels:
    app: euroscale
    component: mysql-proxy
spec:
  type: ClusterIP
  ports:
    - name: mysql
      port: 3307
      targetPort: 3307
      protocol: TCP
  selector:
    app: euroscale
    component: mysql-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-proxy
  namespace: euroscale
  labels:
    app: euroscale
    component: mysql-proxy
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: euroscale
      component: mysql-proxy
  template:
    metadata:
      labels:
        app: euroscale
        component: mysql-proxy
    spec:
      serviceAccountName: euroscale-api
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: mysql-proxy
          image: ghcr.io/spscreations/euroscale-mysql-proxy:latest
          imagePullPolicy: Always
          ports:
            - name: mysql
              containerPort: 3307
              protocol: TCP
          env:
            - name: VTGATE_ADDR
              value: "euroscale-vtgate-208e47d6:3306"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
