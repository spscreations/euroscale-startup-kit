apiVersion: apps/v1
kind: Deployment
metadata:
  name: euroscale-dashboard
  namespace: euroscale
  labels:
    app: euroscale
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euroscale
      component: dashboard
  template:
    metadata:
      labels:
        app: euroscale
        component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dashboard
          # SECURITY: Pin to SHA digest in production when available.
          #   image: ghcr.io/spscreations/euroscale-dashboard@sha256:...
          # Tag-based pulls are mutable; digests guarantee immutability.
          image: ghcr.io/spscreations/euroscale-dashboard:v1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: euroscale-auth-secret
                  key: better_auth_secret
            - name: BETTER_AUTH_URL
              value: "https://euroscale.app"
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.euroscale.app"
            - name: NEXT_PUBLIC_RPC_BASE_URL
              value: "https://api.euroscale.app"
            - name: HOST
              value: "0.0.0.0"
            # Auth DB is MariaDB (euroscale-auth-db), NOT customer Vitess.
            # Secret: euroscale-auth-db-credentials (see infra/secrets/auth-db-secret.yaml)
            - name: AUTH_DB_HOST
              value: "euroscale-auth-db"
            - name: AUTH_DB_PORT
              value: "3306"
            - name: AUTH_DB_USER
              value: "root"
            - name: AUTH_DB_NAME
              value: "euroscale_auth"
            - name: AUTH_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: euroscale-auth-db-credentials
                  key: password
            - name: DB_SSL_CERT
              value: "/etc/euroscale/tls/tls.crt"
            - name: DB_SSL_KEY
              value: "/etc/euroscale/tls/tls.key"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: euroscale-dashboard
  namespace: euroscale
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: euroscale
    component: dashboard
