apiVersion: apps/v1
kind: Deployment
metadata:
  name: euroscale-dashboard
  namespace: euroscale
  labels:
    app: euroscale
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euroscale
      component: dashboard
  template:
    metadata:
      labels:
        app: euroscale
        component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dashboard
          image: ghcr.io/spscreations/euroscale-dashboard:v1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.euroscale.app"
            - name: NEXT_PUBLIC_RPC_BASE_URL
              value: "https://api.euroscale.app"
            - name: HOST
              value: "0.0.0.0"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: euroscale-dashboard
  namespace: euroscale
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: euroscale
    component: dashboard
