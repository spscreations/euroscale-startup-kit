apiVersion: apps/v1
kind: Deployment
metadata:
  name: euroscale-dashboard
  namespace: euroscale
  labels:
    app: euroscale
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: euroscale
      component: dashboard
  template:
    metadata:
      labels:
        app: euroscale
        component: dashboard
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dashboard
          image: ghcr.io/spscreations/euroscale-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://91.99.187.108:30081"
            - name: NEXT_PUBLIC_RPC_BASE_URL
              value: "http://91.99.187.108:30081"
            - name: HOST
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: euroscale-dashboard
  namespace: euroscale
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: euroscale
    component: dashboard
