---
# ConfigMap for the EuroScale API deployment.
#
# Values here are defaults; override per environment as needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: euroscale-config
  namespace: euroscale
  labels:
    app: euroscale
    component: api
data:
  # Vitess vtgate address (service DNS within the cluster).
  vtgate_addr: "euroscale-vtgate.euroscale:3306"
  # K8s namespace the API should manage Secrets in.
  namespace: "euroscale"
  # Backups use Hetzner Object Storage (S3), not MinIO.
  # Endpoint/bucket are configured on VitessCluster + vttablet flags
  # (see infra/vitess/vitess-cluster.yaml). Optional residual for legacy clients:
  # s3_endpoint: "https://nbg1.your-objectstorage.com"
  # Public API host (used in connection strings served to clients).
  api_host: "db.euroscale.app"
