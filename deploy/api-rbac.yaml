---
# ServiceAccount for the EuroScale API to manage K8s Secrets.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: euroscale-api
  namespace: euroscale
  labels:
    app: euroscale
    component: api

---
# Role granting the API permission to manage Secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: euroscale-api-secrets
  namespace: euroscale
  labels:
    app: euroscale
    component: api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]

---
# Role granting the API and volume autoscaler permission to manage PVCs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: euroscale-api-pvcs
  namespace: euroscale
  labels:
    app: euroscale
    component: api
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding attaching the PVC Role to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: euroscale-api-pvcs
  namespace: euroscale
  labels:
    app: euroscale
    component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: euroscale-api-pvcs
subjects:
  - kind: ServiceAccount
    name: euroscale-api
    namespace: euroscale

---
# RoleBinding attaching the Role to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: euroscale-api-secrets
  namespace: euroscale
  labels:
    app: euroscale
    component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: euroscale-api-secrets
subjects:
  - kind: ServiceAccount
    name: euroscale-api
    namespace: euroscale

---
# Role granting the API permission to list VitessBackup CRDs (backups page / PITR).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: euroscale-api-vitess-backups
  namespace: euroscale
  labels:
    app: euroscale
    component: api
rules:
  - apiGroups: ["planetscale.com"]
    resources:
      - vitessbackups
      - vitessbackupstorages
    verbs: ["get", "list", "watch"]

---
# RoleBinding attaching VitessBackup Role to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: euroscale-api-vitess-backups
  namespace: euroscale
  labels:
    app: euroscale
    component: api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: euroscale-api-vitess-backups
subjects:
  - kind: ServiceAccount
    name: euroscale-api
    namespace: euroscale
