---
# Ingress for the EuroScale API gRPC-web endpoint.
# Routes traffic from api.euroscale.app through the Traefik ingress controller
# to the internal ClusterIP service (euroscale-api.euroscale.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-api
  namespace: euroscale
  labels:
    app: euroscale
    component: api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
    # IP whitelist — only allow admin IPs to reach the API directly.
    # WARNING: These IPs are hardcoded. For production, consider managing
    # this via a ConfigMap or external tool to avoid config drift.
    # Update these when admin IPs change.
    traefik.ingress.kubernetes.io/whitelist-source-range: "194.154.34.123/32, 2.84.193.24/32"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.euroscale.app
      secretName: euroscale-api-tls
  rules:
    - host: api.euroscale.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: euroscale-api
                port:
                  number: 8081
