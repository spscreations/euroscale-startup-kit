---
# Ingress for the EuroScale API gRPC-web endpoint.
# Routes traffic from api.euroscale.app through the Traefik ingress controller
# to the internal ClusterIP service (euroscale-api.euroscale.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-api
  namespace: euroscale
  labels:
    app: euroscale
    component: api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.euroscale.app
      secretName: euroscale-api-tls
  rules:
    - host: api.euroscale.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: euroscale-api
                port:
                  number: 8081
