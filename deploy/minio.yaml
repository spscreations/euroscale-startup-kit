---
# EuroScale — MinIO Backup Storage (single-node test)
# Provides S3-compatible storage for Vitess backups.
#
# Service: euroscale-backups:9000 (used by VitessBackupStorage)
# Bucket:  euroscale-backups (created on startup)
# PVC:     10Gi local-path
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: euroscale
  labels:
    app: minio
    component: backups
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-root-credentials
  namespace: euroscale
  labels:
    app: minio
    component: backups
type: Opaque
stringData:
  root-user: "admin"
  root-password: "IRNUMYbb/eA/+3FYlQvkVVPMewQFa1rj"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: euroscale
  labels:
    app: minio
    component: backups
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - "server"
            - "/data"
            - "--console-address"
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root-credentials
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 5
                    mc alias set local http://localhost:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && \
                    mc mb local/euroscale-backups --ignore-existing && \
                    echo "Bucket 'euroscale-backups' ready."
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
# Service used by VitessBackupStorage (endpoint: euroscale-backups:9000)
apiVersion: v1
kind: Service
metadata:
  name: euroscale-backups
  namespace: euroscale
  labels:
    app: minio
    component: backups
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP
---
# Alias service named "minio" for direct access / tooling
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: euroscale
  labels:
    app: minio
    component: backups
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
