---
# Ingress for the EuroScale Dashboard.
# Routes traffic from euroscale.app through the Traefik ingress controller
# to the internal ClusterIP service (euroscale-dashboard.euroscale.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-dashboard
  namespace: euroscale
  labels:
    app: euroscale
    component: dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - euroscale.app
      secretName: euroscale-dashboard-tls
  rules:
    - host: euroscale.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: euroscale-dashboard
                port:
                  number: 80
