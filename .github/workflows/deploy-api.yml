name: Build and Push EuroScale Images

# Hetzner cluster is linux/amd64 (CX23). Local Pi is arm64 — never rely on local QEMU builds.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "deploy/**"
      - "dashboard/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: euroscale

jobs:
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/spscreations/euroscale-api
          tags: |
            type=raw,value=latest
            type=raw,value=v1.3
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-dashboard:
    name: Build & Push Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/spscreations/euroscale-dashboard
          tags: |
            type=raw,value=latest
            type=raw,value=v1.3
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.euroscale.app
            NEXT_PUBLIC_RPC_BASE_URL=https://api.euroscale.app
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-mysql-proxy:
    name: Build & Push MySQL Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/spscreations/euroscale-mysql-proxy
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.mysql-proxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
