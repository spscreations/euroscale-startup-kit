name: Build and Push EuroScale Images

# Hetzner = linux/amd64 (CX23). Local Pi = arm64 (dev only). No QEMU on Pi.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "deploy/**"
      - "dashboard/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: spyridonas
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-api:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-api:v1.3
            ${{ env.REGISTRY }}/spscreations/euroscale-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-dashboard:
    name: Build & Push Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: spyridonas
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.euroscale.app
            NEXT_PUBLIC_RPC_BASE_URL=https://api.euroscale.app
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:v1.9
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:${{ github.sha }}

  build-and-push-mysql-proxy:
    name: Build & Push MySQL Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: spyridonas
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile.mysql-proxy
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-mysql-proxy:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-mysql-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-autoscale-checker:
    name: Build & Push Autoscale Checker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: spyridonas
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile.autoscale-checker
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-autoscale-checker:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-autoscale-checker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Mirror removed 2026-07-17: cluster pulls directly from GHCR via ghcr-pull-secret.
  # 30500 stays admin-only on FW.
