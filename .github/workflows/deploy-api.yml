name: Build and Push EuroScale Images

# Hetzner = linux/amd64 (CX23). Local Pi = arm64 (dev only). No QEMU on Pi.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "deploy/**"
      - "dashboard/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-api:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-api:v1.3
            ${{ env.REGISTRY }}/spscreations/euroscale-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-dashboard:
    name: Build & Push Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.euroscale.app
            NEXT_PUBLIC_RPC_BASE_URL=https://api.euroscale.app
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:v1.3
            ${{ env.REGISTRY }}/spscreations/euroscale-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-mysql-proxy:
    name: Build & Push MySQL Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile.mysql-proxy
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/spscreations/euroscale-mysql-proxy:latest
            ${{ env.REGISTRY }}/spscreations/euroscale-mysql-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Mirror GHCR amd64 images into in-cluster registry (public NodePort) so Talos can pull without GHCR PAT.
  mirror-to-cluster-registry:
    name: Mirror images to cluster registry
    needs: [build-and-push-api, build-and-push-dashboard, build-and-push-mysql-proxy]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull from GHCR and push to cluster registry
        env:
          CLUSTER_REG: 116.202.105.201:30500
          SHA: ${{ github.sha }}
        run: |
          set -e
          # insecure registry
          echo "{\"insecure-registries\":[\"${CLUSTER_REG}\"]}" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 3
          for pair in euroscale-api:latest euroscale-dashboard:latest euroscale-mysql-proxy:latest; do
            name=${pair%%:*}
            tag=${pair##*:}
            docker pull ghcr.io/spscreations/${name}:${SHA}
            docker tag ghcr.io/spscreations/${name}:${SHA} ${CLUSTER_REG}/${name}:${tag}
            docker tag ghcr.io/spscreations/${name}:${SHA} ${CLUSTER_REG}/${name}:${SHA}
            docker push ${CLUSTER_REG}/${name}:${tag}
            docker push ${CLUSTER_REG}/${name}:${SHA}
          done
