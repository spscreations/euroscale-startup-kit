name: Deploy EuroScale API

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Override image tag (default: git SHA)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: spscreations/euroscale-api
  NAMESPACE: euroscale
  DEPLOYMENT: euroscale-api
  CONTAINER: api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write                        # for image attestation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Set up multi-arch build support ──────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker metadata (OCI labels, version) ────────────────────────────
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
          labels:
            org.opencontainers.image.title=EuroScale API
            org.opencontainers.image.description=Serverless MySQL/Postgres database provisioning API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Authenticate & build ────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: |
            linux/amd64
            linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true                                  # SLSA provenance
          sbom: true                                        # Software Bill of Materials

      # ── Optional: image attestation (requires GH Ent) ───────────────────
      # - name: Attest image provenance
      #   uses: actions/attest-build-provenance@v1
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     subject-digest: ${{ steps.build.outputs.digest }}
      #     push-to-registry: true

      - name: Output image digest
        run: |
          echo "## Image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
