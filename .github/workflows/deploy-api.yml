name: Build and Push EuroScale Images

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'deploy/**'
      - 'dashboard/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Override image tag (default: git SHA + v1.x)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  NAMESPACE: euroscale

jobs:
  # ── API Image ───────────────────────────────────────────────────
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write                        # for image attestation

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # ── Set up Docker Buildx ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Docker metadata
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/spscreations/euroscale-api
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
            type=raw,value=v1.3
            type=raw,value=v1.2
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
          labels:
            org.opencontainers.image.title=EuroScale API
            org.opencontainers.image.description=Serverless MySQL/Postgres database provisioning API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Authenticate & build ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Hetzner CAX is ARM64; build for both amd64 (CI runners) and arm64 (production)
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true                                  # SLSA provenance
          sbom: true                                        # Software Bill of Materials

      # ── Deploy to K3s (requires KUBECONFIG secret) ─────────────
      # NOTE: Set KUBECONFIG as a base64-encoded secret in GitHub.
      # Deploy steps use continue-on-error so CI passes even without
      # cluster access (e.g., in PRs from forks).
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.5'
        continue-on-error: true

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        continue-on-error: true

      - name: Deploy API to K3s
        # Uses the full git SHA tag (matches docker/metadata-action type=sha,format=long)
        continue-on-error: true
        run: |
          SHA_TAG="${{ github.sha }}"
          kubectl set image deployment/euroscale-api \
            api=${{ env.REGISTRY }}/spscreations/euroscale-api:${SHA_TAG} \
            --namespace ${{ env.NAMESPACE }}
          kubectl rollout status deployment/euroscale-api \
            --namespace ${{ env.NAMESPACE }} --timeout=180s

      - name: Output image digest
        run: |
          echo "## Image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/spscreations/euroscale-api@${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | \`linux/amd64,linux/arm64\` |" >> $GITHUB_STEP_SUMMARY

  # ── Dashboard Image ────────────────────────────────────────────
  build-and-push-dashboard:
    name: Build & Push Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/spscreations/euroscale-dashboard
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest
            type=raw,value=v1.3
            type=raw,value=v1.2
          labels:
            org.opencontainers.image.title=EuroScale Dashboard
            org.opencontainers.image.description=Customer dashboard for EuroScale database platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Hetzner CAX is ARM64; build for both amd64 (CI runners) and arm64 (production)
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.euroscale.app
            NEXT_PUBLIC_RPC_BASE_URL=https://api.euroscale.app
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to K3s (requires KUBECONFIG secret) ─────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.5'
        continue-on-error: true

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        continue-on-error: true

      - name: Deploy Dashboard to K3s
        continue-on-error: true
        run: |
          SHA_TAG="${{ github.sha }}"
          kubectl set image deployment/euroscale-dashboard \
            dashboard=${{ env.REGISTRY }}/spscreations/euroscale-dashboard:${SHA_TAG} \
            --namespace ${{ env.NAMESPACE }}
          kubectl rollout status deployment/euroscale-dashboard \
            --namespace ${{ env.NAMESPACE }} --timeout=180s
