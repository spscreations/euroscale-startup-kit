# Better Auth MariaDB — MUST use a PVC (never emptyDir).
# emptyDir wiped production users on pod recreate (2026-07-15 incident).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: euroscale-auth-db-data
  namespace: euroscale
  labels:
    app: euroscale-auth-db
    component: auth-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: euroscale-auth-db
  namespace: euroscale
  labels:
    app: euroscale-auth-db
    component: auth-db
spec:
  replicas: 1
  # RWO PVC: RollingUpdate can leave two pods fighting the same volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: euroscale-auth-db
  template:
    metadata:
      labels:
        app: euroscale-auth-db
        component: auth-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.4
        env:
        # Password lives in euroscale-auth-db-credentials (see infra/secrets/auth-db-secret.yaml).
        # Only applied on first MariaDB init; changing the secret later requires a password rotation.
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: euroscale-auth-db-credentials
              key: password
        - name: MARIADB_DATABASE
          value: euroscale_auth
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        readinessProbe:
          exec:
            command:
              - healthcheck.sh
              - --connect
              - --innodb_initialized
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
              - healthcheck.sh
              - --connect
              - --innodb_initialized
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: euroscale-auth-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: euroscale-auth-db
  namespace: euroscale
  labels:
    app: euroscale-auth-db
    component: auth-db
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: euroscale-auth-db
