# ─────────────────────────────────────────────────────────────────────
# EuroScale — Layer 5: Weekly Automated Restore Test CronJob
# ─────────────────────────────────────────────────────────────────────
# Runs a full backup → restore → verify cycle every Sunday at 03:00 UTC
# inside an isolated test namespace.  Validates that backups are usable
# and that the recovery procedure works end-to-end.
#
# ── Prerequisites ───────────────────────────────────────────────────
# 1. Vitess Operator installed in the cluster.
# 2. MinIO accessible with backup data.
# 3. vitess-backup-creds Secret exists in euroscale namespace.
# 4. restore-test.sh available (packaged via ConfigMap below).
#
# ── Applying ────────────────────────────────────────────────────────
#   kubectl apply -f weekly-restore-cronjob.yaml
#
# ── Manual Trigger ──────────────────────────────────────────────────
#   kubectl create job --from=cronjob/euroscale-restore-test manual-restore -n euroscale
#   kubectl logs -l app=euroscale-restore-test -n euroscale -f
# ─────────────────────────────────────────────────────────────────────

---
# ═════════════════════════════════════════════════════════════════════
# ServiceAccount for the restore test job
# ═════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: euroscale-restore-test
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test

---
# ═════════════════════════════════════════════════════════════════════
# ClusterRole: Permissions needed for restore testing
# ═════════════════════════════════════════════════════════════════════
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: euroscale-restore-test
  labels:
    app: euroscale
    component: backups
    layer: restore-test
rules:
  # Namespace management (create, delete test namespace)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list"]
  # Full access within test namespace
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # Vitess Operator CRDs
  - apiGroups: ["planetscale.com"]
    resources: ["vitessclusters", "vitessbackups", "vitessbackupshards"]
    verbs: ["*"]
  # Read backup creds from euroscale namespace
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["vitess-backup-creds"]

---
# ═════════════════════════════════════════════════════════════════════
# ClusterRoleBinding
# ═════════════════════════════════════════════════════════════════════
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: euroscale-restore-test
  labels:
    app: euroscale
    component: backups
    layer: restore-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: euroscale-restore-test
subjects:
  - kind: ServiceAccount
    name: euroscale-restore-test
    namespace: euroscale

---
# ═════════════════════════════════════════════════════════════════════
# CronJob: Weekly Restore Test
# ═════════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: euroscale-restore-test
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test
spec:
  # Every Sunday at 03:00 UTC
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800   # 30 min max
      ttlSecondsAfterFinished: 86400  # Keep pod logs for 24h
      template:
        metadata:
          labels:
            app: euroscale-restore-test
            component: backups
        spec:
          serviceAccountName: euroscale-restore-test
          restartPolicy: Never
          containers:
            - name: restore-test
              image: vitess/lite:v20.0.0
              command:
                - /bin/bash
                - -c
                - |
                  export MINIO_ENDPOINT="http://euroscale-backups.minio:9000"
                  export MINIO_BUCKET="euroscale-backups"
                  export MINIO_REGION="euroscale"
                  export TEST_NAMESPACE="euroscale-restore-test-$(date +%s)"
                  exec /bin/bash /scripts/restore-test.sh
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vitess-backup-creds
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vitess-backup-creds
                      key: secret-key
                - name: PROMETHEUS_PUSHGATEWAY
                  value: "pushgateway.monitoring.svc:9091"
              volumeMounts:
                - name: restore-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: restore-script
              configMap:
                name: euroscale-restore-test-script
                defaultMode: 0755

---
# ═════════════════════════════════════════════════════════════════════
# ConfigMap: restore-test.sh script template
# ═════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: euroscale-restore-test-script
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test
data:
  restore-test.sh: |
    # See: infra/backups/restore-test.sh for the full script.
    # Mount this ConfigMap as /scripts/restore-test.sh.
    # The main script is maintained at infra/backups/restore-test.sh in the repo.
