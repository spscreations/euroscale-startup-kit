# ─────────────────────────────────────────────────────────────────────
# EuroScale — Layer 3: Weekly Automated Restore Test CronJob
# ─────────────────────────────────────────────────────────────────────
# Runs a full backup → restore → verify cycle every Sunday at 03:00 UTC
# inside an isolated test namespace.  Validates that backups are usable
# and that the recovery procedure works end-to-end.
#
# Architecture:
#   ┌──────────────────┐    Sunday 03:00 UTC    ┌────────────────────┐
#   │  Weekly CronJob   │ ────────────────────▶ │  Isolated Test     │
#   │  runs restore-    │   Deploy → Restore →  │  Namespace         │
#   │  test.sh          │   Verify → Cleanup    │  (temporary)       │
#   └──────────────────┘                        └────────────────────┘
#                                                        │
#                                                Metrics → Pushgateway
#                                                        │
#                                                ┌──────────────────┐
#                                                │  Prometheus       │
#                                                │  → RestoreTest-   │
#                                                │    Failed alert   │
#                                                └──────────────────┘
#
# ── Prerequisites ───────────────────────────────────────────────────
# 1. Vitess Operator installed in the cluster.
# 2. MinIO accessible with backup data.
# 3. vitess-backup-creds Secret exists in euroscale namespace.
# 4. Prometheus Pushgateway deployed (optional, for metrics export).
# 5. restore-test.sh is available (packaged via ConfigMap below).
#
# ── Applying ────────────────────────────────────────────────────────
#   kubectl apply -f weekly-restore-cronjob.yaml
#   # Trigger manually:
#   kubectl create job --from=cronjob/euroscale-restore-test manual-restore-test -n euroscale
#   kubectl logs -l app=euroscale-restore-test -n euroscale --tail=200 -f
#
# ── RBAC ────────────────────────────────────────────────────────────
# The CronJob runs with a ServiceAccount that needs:
#   - Create/delete namespaces
#   - Full control within the test namespace
#   - Read Secrets from euroscale namespace
# These are defined in the RBAC resources below.
# ─────────────────────────────────────────────────────────────────────

---
# ═════════════════════════════════════════════════════════════════════
# ServiceAccount for the restore test job
# ═════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: euroscale-restore-test
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test

---
# ═════════════════════════════════════════════════════════════════════
# ClusterRole: Permissions needed for restore testing
# ═════════════════════════════════════════════════════════════════════
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: euroscale-restore-test
  labels:
    app: euroscale
    component: backups
    layer: restore-test
rules:
  # Namespace management (create, delete test namespace)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "delete", "get", "list"]
  # Full access within test namespace
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # Vitess Operator CRDs
  - apiGroups: ["planetscale.com"]
    resources: ["vitessclusters", "vitessbackups", "vitessbackupshards"]
    verbs: ["*"]
  # Read backup creds from euroscale namespace
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["vitess-backup-creds"]

---
# ═════════════════════════════════════════════════════════════════════
# ClusterRoleBinding
# ═════════════════════════════════════════════════════════════════════
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: euroscale-restore-test
  labels:
    app: euroscale
    component: backups
    layer: restore-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: euroscale-restore-test
subjects:
  - kind: ServiceAccount
    name: euroscale-restore-test
    namespace: euroscale

---
# ═════════════════════════════════════════════════════════════════════
# ConfigMap: restore-test.sh script
# ═════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: euroscale-restore-test-script
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test
data:
  restore-test.sh: |
    # See: infra/backups/restore-test.sh for the full script.
    # The CronJob below uses the script baked into the image;
    # this ConfigMap documents the expected location and serves
    # as a reference when customizing the job.

---
# ═════════════════════════════════════════════════════════════════════
# CronJob: Weekly Restore Test
# ═════════════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: euroscale-restore-test
  namespace: euroscale
  labels:
    app: euroscale
    component: backups
    layer: restore-test
spec:
  # Every Sunday at 03:00 UTC
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800   # 30 min max (RTO SLA)
      ttlSecondsAfterFinished: 86400  # Keep pod logs for 24h
      template:
        metadata:
          labels:
            app: euroscale-restore-test
            component: backups
        spec:
          serviceAccountName: euroscale-restore-test
          restartPolicy: Never
          containers:
            - name: restore-test
              image: vitess/lite:v20.0.0
              command:
                - /bin/bash
                - -c
                - |
                  # ── Install prerequisites ──────────────────────
                  apt-get update -qq && apt-get install -y -qq curl wget >/dev/null 2>&1 || true

                  # ── Download restore-test.sh or run inline ─────
                  # The full restore-test.sh is stored as a ConfigMap
                  # and can be mounted as a volume, or downloaded from
                  # the repo.  For the CronJob, we embed the logic
                  # directly below OR mount a ConfigMap volume.

                  # Export required env vars (from Secret refs)
                  export MINIO_ENDPOINT="http://euroscale-backups.minio:9000"
                  export MINIO_BUCKET="euroscale-backups"
                  export MINIO_REGION="euroscale"
                  export TEST_NAMESPACE="euroscale-restore-test-\$(date +%s)"

                  # ── Run the restore test ───────────────────────
                  exec /bin/bash /scripts/restore-test.sh
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vitess-backup-creds
                      key: access-key
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vitess-backup-creds
                      key: secret-key
                - name: PROMETHEUS_PUSHGATEWAY
                  value: "pushgateway.monitoring.svc:9091"
              volumeMounts:
                - name: restore-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: restore-script
              configMap:
                name: euroscale-restore-test-script
                defaultMode: 0755
