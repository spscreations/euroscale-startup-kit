# ─────────────────────────────────────────────────────────────────────
# EuroScale — Backup Retention Policy
# ─────────────────────────────────────────────────────────────────────
# Defines retention periods for each backup layer. This is a
# documentation-only file (the actual retention is configured in each
# component's config). It serves as the source of truth for operations
# teams.
#
# Retention is driven by:
#   - RPO (Recovery Point Objective) — max acceptable data loss
#   - RTO (Recovery Time Objective) — max acceptable downtime
#   - Cost — storage costs increase with retention length
#   - Compliance — GDPR may require certain data retention periods

# ═══════════════════════════════════════════════════════════════════
# Layer 2: Vitess Native S3 Backups (MinIO)
# ═══════════════════════════════════════════════════════════════════
backup_layer_2:
  description: "Vitess built-in backups → MinIO (in-cluster)"
  storage: "MinIO PVC (100Gi, local-path StorageClass)"

  schedules:
    - name: full-backup
      type: Full
      schedule: "Daily @ 02:00 UTC"
      retention:
        count: 7            # Keep 7 daily full backups (1 week)
        max_age_days: 10    # Auto-delete after 10 days
        cleanup_method: "Vitess built-in retention (VitessBackup.Spec.TTL)"

    - name: incremental-backup
      type: Incremental (binary log)
      schedule: "Every 15 minutes"
      retention:
        count: 96           # Keep 96 incrementals = 24 hours
        max_age_hours: 24
        cleanup_method: "Vitess built-in retention"

  # PITR window: last 24 hours
  # To restore to any point within the last 24 hours, use:
  #   RestoreFromBackup + restore_to_timestamp

# ═══════════════════════════════════════════════════════════════════
# Layer 3: Off-Site Sync (Hetzner Storage Box)
# ═══════════════════════════════════════════════════════════════════
backup_layer_3:
  description: "rclone sync MinIO → Hetzner Storage Box (SFTP)"
  storage: "Hetzner Storage Box (SFTP, Nuremberg DC)"
  frequency: "Every 6 hours"
  retention:
    # Active backups: synced from MinIO, latest always available
    active:
      count: 1              # Always 1 copy of latest state

    # Archive: changed/deleted files preserved in date-stamped dirs
    archive:
      max_age_days: 30      # Keep archived changes for 30 days
      cleanup_method: "Manual / scheduled: rclone delete --min-age 30d"

    # Total retention: 30 days of daily archives +
    #                  latest active snapshot

# ═══════════════════════════════════════════════════════════════════
# Layer 4: etcd Snapshots
# ═══════════════════════════════════════════════════════════════════
backup_layer_4:
  description: "K3s embedded etcd snapshots → Hetzner Object Storage"
  storage: "Hetzner Object Storage (S3-compatible, nbg1 region)"
  schedule: "Every 6 hours"
  retention:
    count: 7                # Keep 7 most recent snapshots (~42h window)
    local_count: 5          # Also keep 5 locally on the control-plane node
    cleanup_method: "K3s built-in retention (--etcd-snapshot-retention)"

# ═══════════════════════════════════════════════════════════════════
# Layer 5: Restore Test Artifacts
# ═══════════════════════════════════════════════════════════════════
backup_layer_5:
  description: "Weekly automated restore test (temporary namespace)"
  storage: "Ephemeral — created for test, deleted after verification"
  schedule: "Weekly @ Sunday 03:00 UTC"
  retention:
    # Test artifacts (pods, PVCs) are deleted immediately after test
    logs:
      max_age_days: 7        # CronJob keeps last 4 successful + 2 failed runs
    cleanup_method: "CronJob ttlSecondsAfterFinished: 604800 (7 days)"

# ═══════════════════════════════════════════════════════════════════
# Layer 1: Live Replication (not a backup per se, but part of DR)
# ═══════════════════════════════════════════════════════════════════
backup_layer_1:
  description: "Live cross-cell replication (Nuremberg ↔ Helsinki)"
  type: "Synchronous replication (Vitess cross_cell durability)"
  retention: "N/A — live data, not a backup store"

# ═══════════════════════════════════════════════════════════════════
# Storage Capacity Planning
# ═══════════════════════════════════════════════════════════════════
storage_planning:
  minio_pvc:
    current_size: "100Gi"
    growth_rate: "~1-2 GiB/week (MVP stage)"
    projected_3_months: "120-130 GiB"
    expansion_trigger: "85% utilization"
    expansion_action: "Increase PVC size by 50Gi (Helm upgrade)"

  storage_box:
    current_limit: "500 GiB (Hetzner Storage Box S)"
    usage: "~1-5 GiB/week (MVP stage, Vitess backups are small)"
    retention_impact: "30-day archive at current growth rate: ~20 GiB/month"

  hetzner_object_storage:
    current_bucket: "euroscale-etcd-backups"
    usage: "~100 MiB/snapshot (etcd only, small)"
    retention_impact: "7 snapshots at ~100MiB each = ~700 MiB"

# ═══════════════════════════════════════════════════════════════════
# GDPR / Compliance Notes
# ═══════════════════════════════════════════════════════════════════
# - All backups are stored within the EU (Nuremberg, Germany)
# - Hetzner is GDPR-compliant (German data center)
# - MinIO PVC and Hetzner Storage Box are in the same DC
# - etcd snapshots contain Kubernetes Secrets (encrypted at rest)
# - Database backups may contain PII — access is restricted via
#   Kubernetes RBAC to the backups namespace
# - For data subject deletion requests, restore the backup first,
#   delete the record, then re-backup
