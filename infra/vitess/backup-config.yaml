# ─────────────────────────────────────────────────────────────────────
# EuroScale — Vitess Native Backups: Hetzner Object Storage (S3)
# ─────────────────────────────────────────────────────────────────────
# Reference config for Vitess builtin backups → Hetzner Object Storage.
# MinIO is DEPRECATED and no longer deployed (see git history for old
# deploy/minio.yaml). Live cluster uses Hetzner only.
#
# Architecture:
#   ┌─────────────┐     S3 API (HTTPS)      ┌──────────────────────────┐
#   │  vttablet   │ ──────────────────────▶ │  Hetzner Object Storage  │
#   │  vtbackup   │   forcePathStyle=true   │  nbg1.your-objectstorage │
#   │  vtctld     │   bucket below          │  euroscale-etcd-backups  │
#   └─────────────┘                         └──────────────────────────┘
#
# Schedules: NOT on the VitessCluster CR (operator schedules deleted).
# K8s CronJobs own the schedule:
#   deploy/backup-cronjob.yaml
#   deploy/pitr-incremental-cronjob.yaml
#
# S3 endpoint injection for backup pods:
#   deploy/webhook-s3-injector.yaml
#
# ── Prerequisites ───────────────────────────────────────────────────
# 1. Hetzner Object Storage bucket `euroscale-etcd-backups` in nbg1.
# 2. Secret `vitess-backup-creds` in namespace euroscale with key
#    `credentials` (AWS credentials file format). Do not commit secrets.
# 3. webhook-s3-injector deployed so backup Job pods get AWS endpoint env.
#
# ── Applying ────────────────────────────────────────────────────────
#   1. Create/update vitess-backup-creds from operator runbook (cluster only)
#   2. Ensure vitess-cluster.yaml backup + vttablet extraFlags match below
#   3. kubectl apply -f infra/vitess/vitess-cluster.yaml
#   4. kubectl apply -f deploy/backup-cronjob.yaml
#   5. kubectl apply -f deploy/pitr-incremental-cronjob.yaml
#   6. kubectl apply -f deploy/webhook-s3-injector.yaml
#
# ── Restoring ───────────────────────────────────────────────────────
#   kubectl get vitessbackups -n euroscale
#   vtctldclient --server=<vtctld>:15999 BackupShard main/-
#   vtctldclient --server=<vtctld>:15999 RestoreFromBackup main/-
#   # PITR:
#   vtctldclient --server=<vtctld>:15999 RestoreFromBackup main/- \
#     --restore_to_timestamp "2026-07-03T02:00:00Z"
# ─────────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════════
# SECTION 1: Backup section for vitess-cluster.yaml (live-matched)
# ═════════════════════════════════════════════════════════════════════
# Under `spec:` — no schedules (CronJobs handle scheduling).
#
#   backup:
#     engine: builtin
#     locations:
#       - name: hetzner
#         s3:
#           endpoint: https://nbg1.your-objectstorage.com
#           region: nbg1
#           bucket: euroscale-etcd-backups
#           forcePathStyle: true
#           authSecret:
#             name: vitess-backup-creds
#             key: credentials
#
# vttablet extraFlags (on tabletPools only — NEVER on vtgate gateway):
#
#   backup_engine_implementation: builtin
#   backup_storage_implementation: s3
#   s3_backup_storage_bucket: euroscale-etcd-backups
#   s3_backup_aws_endpoint: https://nbg1.your-objectstorage.com
#   s3_backup_aws_region: nbg1
#   s3_backup_force_path_style: "true"
#
# NEVER set incremental_backup on vttablet (crashes Vitess v24.0.1).
# NEVER put backup_* / s3_backup_* flags on cell gateway extraFlags.

# ═════════════════════════════════════════════════════════════════════
# SECTION 2: MinIO — DEPRECATED
# ═════════════════════════════════════════════════════════════════════
# In-cluster MinIO (deploy/minio.yaml, euroscale-backups service, bucket
# euroscale-backups) is removed. Do not redeploy MinIO for Vitess backups.
# Use Hetzner Object Storage + webhook-s3-injector + CronJobs above.
