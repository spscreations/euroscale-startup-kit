# ═════════════════════════════════════════════════════════════════════
# SECTION 4: MinIO Deployment Reference
# ═════════════════════════════════════════════════════════════════════
# If MinIO is not yet deployed, use this minimal StatefulSet definition.
# For production, use the official MinIO Operator or Helm chart:
#   helm repo add minio https://charts.min.io/
#   helm upgrade --install minio minio/minio \
#     --namespace euroscale \
#     --set rootUser=admin,rootPassword=<strong-password> \
#     --set persistence.size=50Gi \
#     --set resources.requests.memory=256Mi \
#     --set service.type=ClusterIP
#
# The service should be reachable at: euroscale-minio.euroscale.svc:9000
# Console (web UI) at: euroscale-minio-console.euroscale.svc:9001
