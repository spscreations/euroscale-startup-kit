# EuroScale Vitess Operator — VitessCluster CRD
# Multi-region cluster: primary in Nuremberg, replicas in Nuremberg + Helsinki
# apiVersion: planetscale.com/v2
# See: https://github.com/planetscale/vitess-operator/blob/main/docs/api.md
apiVersion: planetscale.com/v2
kind: VitessCluster
metadata:
  name: euroscale
  namespace: euroscale
spec:
  # ── Container Images ──────────────────────────────────────────
  images:
    vtctld: vitess/lite:v24.0.1
    vtgate: vitess/lite:v24.0.1
    vttablet: vitess/lite:v24.0.1
    mysqld:
      mysql80Compatible: vitess/lite:v24.0.1

  # ── Backups (Hetzner Object Storage / S3) ─────────────────────
  # Schedules intentionally omitted: operator VitessBackupSchedule CRs are
  # deleted. K8s CronJobs own the schedule:
  #   deploy/backup-cronjob.yaml
  #   deploy/pitr-incremental-cronjob.yaml
  # Do NOT put backup_* flags on vtgate gateway extraFlags (vttablet only).
  backup:
    engine: builtin
    locations:
      - name: hetzner
        s3:
          endpoint: https://nbg1.your-objectstorage.com
          region: nbg1
          bucket: euroscale-etcd-backups
          forcePathStyle: true
          authSecret:
            name: vitess-backup-creds
            key: credentials

  # ── Global Lockserver (etcd, auto-deployed) ──────────────────
  globalLockserver:
    etcd:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 384Mi

  # ── Update Strategy (Immediate for MVP simplicity) ───────────
  updateStrategy:
    type: Immediate

  # ── vtctld (Dashboard) ───────────────────────────────────────
  vitessDashboard:
    cells:
      - nuremberg
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ── Cells (failure domains) ──────────────────────────────────
  cells:
    - name: nuremberg
      gateway:
        replicas: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 256m
            memory: 256Mi
        extraFlags:
          mysql_auth_server_impl: "none"
          tablet_types_to_wait: "REPLICA,PRIMARY"
          mysql_server_version: "8.0.36"
          mysql_auth_server_static_string: '{"mysql_user":[{"Password":"","UserData":"mysql_user"}]}'
        secureTransport:
          required: true
          tls:
            certSecret:
              name: euroscale-vtgate-tls
              key: tls.crt
            keySecret:
              name: euroscale-vtgate-tls
              key: tls.key
            clientCACertSecret:
              name: euroscale-db-ca
              key: ca.crt

    - name: helsinki
      gateway:
        replicas: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 256m
            memory: 256Mi
        extraFlags:
          mysql_auth_server_impl: "none"
          tablet_types_to_wait: "REPLICA,PRIMARY"
          mysql_server_version: "8.0.36"
          mysql_auth_server_static_string: '{"mysql_user":[{"Password":"","UserData":"mysql_user"}]}'
        secureTransport:
          required: true
          tls:
            certSecret:
              name: euroscale-vtgate-tls
              key: tls.crt
            keySecret:
              name: euroscale-vtgate-tls
              key: tls.key
            clientCACertSecret:
              name: euroscale-db-ca
              key: ca.crt

  keyspaces:
    - name: main
      durabilityPolicy: cross_cell
      turndownPolicy: Immediate
      partitionings:
        - equal:
            parts: 1
            shardTemplate:
              databaseInitScriptSecret:
                name: vitess-init-sql
                key: init.sql
              tabletPools:
                # ── Nuremberg: Primary-eligible tablets (2) ────
                - cell: nuremberg
                  type: replica
                  replicas: 2
                  dataVolumeClaimTemplate:
                    accessModes:
                      - ReadWriteOnce
                    storageClassName: hcloud-volumes
                    resources:
                      requests:
                        storage: 10Gi
                  vttablet:
                    # S3 backup flags live on vttablet only (never on vtgate).
                    # Do NOT set incremental_backup — crashes Vitess v24.0.1.
                    extraFlags:
                      backup_engine_implementation: builtin
                      backup_storage_implementation: s3
                      s3_backup_storage_bucket: euroscale-etcd-backups
                      s3_backup_aws_endpoint: https://nbg1.your-objectstorage.com
                      s3_backup_aws_region: nbg1
                      s3_backup_force_path_style: "true"
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 256m
                        memory: 256Mi
                  mysqld:
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: 500m
                        memory: 1Gi

                # ── Helsinki: Read replica (1) ─────────────────
                - cell: helsinki
                  type: replica
                  replicas: 1
                  dataVolumeClaimTemplate:
                    accessModes:
                      - ReadWriteOnce
                    storageClassName: hcloud-volumes
                    resources:
                      requests:
                        storage: 10Gi
                  vttablet:
                    # S3 backup flags live on vttablet only (never on vtgate).
                    # Do NOT set incremental_backup — crashes Vitess v24.0.1.
                    extraFlags:
                      backup_engine_implementation: builtin
                      backup_storage_implementation: s3
                      s3_backup_storage_bucket: euroscale-etcd-backups
                      s3_backup_aws_endpoint: https://nbg1.your-objectstorage.com
                      s3_backup_aws_region: nbg1
                      s3_backup_force_path_style: "true"
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 256m
                        memory: 256Mi
                  mysqld:
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: 500m
                        memory: 1Gi
