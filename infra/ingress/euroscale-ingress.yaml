apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-dashboard
  namespace: euroscale
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: euroscale-ip-whitelist@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: euroscale.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: euroscale-dashboard
            port:
              number: 3000
  - host: www.euroscale.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: euroscale-dashboard
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-api
  namespace: euroscale
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: euroscale-ip-whitelist@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: api.euroscale.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: euroscale-api
            port:
              number: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: euroscale-db
  namespace: euroscale
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
  - host: db.euroscale.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: euroscale-api
            port:
              number: 3306
