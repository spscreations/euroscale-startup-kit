# TEMPLATE — DO NOT COMMIT WITH REAL SECRETS.
# Auth DB credentials for euroscale-auth-db (MariaDB) used by the dashboard.
#
# Create / update the actual secret in-cluster (never commit real password):
#
#   export KUBECONFIG=infra/k3s/kubeconfig
#   kubectl create secret generic euroscale-auth-db-credentials \
#     --namespace euroscale \
#     --from-literal=username=root \
#     --from-literal=password='REPLACE_ME' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Used by:
#   - deploy/dashboard-deployment.yaml  (AUTH_DB_USER / AUTH_DB_PASS)
#   - infra/k3s/auth-db.yaml            (MARIADB_ROOT_PASSWORD)
#
# REQUIRED KEYS:
#   username  — MariaDB user (root for this deployment)
#   password  — MariaDB root password (must match MARIADB_ROOT_PASSWORD used at first init)
#
# IMPORTANT: Do NOT point AUTH_DB_* at customer Vitess DB secrets
# (e.g. db-*-creds). Those are per-tenant DBs, not the platform auth store.
---
apiVersion: v1
kind: Secret
metadata:
  name: euroscale-auth-db-credentials
  namespace: euroscale
  labels:
    app: euroscale
    component: auth-db
type: Opaque
stringData:
  username: "root"
  password: "REPLACE_ME"
