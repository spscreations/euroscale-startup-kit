# TEMPLATE — DO NOT COMMIT WITH REAL SECRETS.
# This is a reference manifest. Create the actual secret with:
#
#   kubectl create secret generic euroscale-mollie \
#     --namespace euroscale \
#     --from-literal=api_key=live_... \
#     --from-literal=webhook_secret=wh_...
#
# Or use a sealed-secrets / external-secrets operator for production.
#
# REQUIRED KEYS:
#   api_key         — Mollie API key (live_… / test_…)
#   webhook_secret  — Mollie webhook signing secret (enables X-Mollie-Signature checks)
#
# LIVE CLUSTER NOTE (re-audit 2026-07-15):
#   Secret `euroscale-mollie` currently has only `api_key` (1 data key).
#   Without `webhook_secret`, the API logs:
#     WARNING: MOLLIE_WEBHOOK_SECRET not set — webhook signature verification disabled
#   Add `webhook_secret` in-cluster (never commit the value). See deploy/README.md.
#
# The placeholder keys below are intentionally invalid. Never commit live API keys.
---
apiVersion: v1
kind: Secret
metadata:
  name: euroscale-mollie
  namespace: euroscale
  labels:
    app: euroscale
    component: api
type: Opaque
stringData:
  api_key: "REPLACE_WITH_MOLLIE_API_KEY"
  webhook_secret: "REPLACE_WITH_MOLLIE_WEBHOOK_SECRET"
