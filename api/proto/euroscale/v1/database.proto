syntax = "proto3";

package euroscale.v1;

option go_package = "github.com/spscreations/euroscale-startup-kit/api/gen/euroscale/v1;euroscalev1";

// DatabaseService provisions and manages Vitess databases on demand.
service DatabaseService {
  // CreateDatabase provisions a new Vitess database with auto-generated credentials.
  // The credentials (username/password) are returned ONCE in this response and never again.
  rpc CreateDatabase(CreateDatabaseRequest) returns (CreateDatabaseResponse);

  // DeleteDatabase drops a database and removes all associated credentials and secrets.
  rpc DeleteDatabase(DeleteDatabaseRequest) returns (DeleteDatabaseResponse);

  // ListDatabases returns all databases owned by a given user.
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);

  // GetDatabase returns metadata for a single database (no credentials).
  rpc GetDatabase(GetDatabaseRequest) returns (GetDatabaseResponse);

  // RotateCredentials generates new credentials for an existing database,
  // invalidating the old ones. Returns the new credentials ONCE.
  rpc RotateCredentials(RotateCredentialsRequest) returns (RotateCredentialsResponse);

  // GetIPWhitelist returns the IP whitelist for a database.
  rpc GetIPWhitelist(GetIPWhitelistRequest) returns (GetIPWhitelistResponse);

  // AddIPWhitelistEntry adds a CIDR range to a database's IP whitelist.
  rpc AddIPWhitelistEntry(AddIPWhitelistEntryRequest) returns (AddIPWhitelistEntryResponse);

  // RemoveIPWhitelistEntry removes a CIDR range from a database's IP whitelist.
  rpc RemoveIPWhitelistEntry(RemoveIPWhitelistEntryRequest) returns (RemoveIPWhitelistEntryResponse);

  // GetUsage returns the current usage and tier limits for a user.
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // SetUserTier updates the subscription tier for a user (admin only).
  rpc SetUserTier(SetUserTierRequest) returns (SetUserTierResponse);

  // ResizeStorage expands a database's persistent volume by the specified GB.
  rpc ResizeStorage(ResizeStorageRequest) returns (ResizeStorageResponse);

  // SetAutoscale enables/disables automatic storage scaling for a database.
  rpc SetAutoscale(SetAutoscaleRequest) returns (SetAutoscaleResponse);

  // GetMetrics returns CPU and disk metrics for a database (last 24h).
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

  // GetSSLCertificates returns the SSL client certificates for a database.
  rpc GetSSLCertificates(GetSSLCertificatesRequest) returns (GetSSLCertificatesResponse);
}

// ── CreateDatabase ──────────────────────────────────────────────────────────

message CreateDatabaseRequest {
  // Required. Name of the database to create. Must be a valid MySQL identifier.
  string name = 1;

  // Database engine. Must be "mysql".
  string engine = 2;

  // Region to provision in: "nuremberg" or "helsinki".
  string region = 3;

  // ID of the user who will own this database.
  string user_id = 4;
}

message CreateDatabaseResponse {
  // Unique ID assigned to this database (UUID v4).
  string database_id = 1;

  // Full MySQL connection string with embedded credentials.
  // Format: mysql://{user}:{pass}@{host}:3306/{db_name}?ssl-mode=VERIFY_IDENTITY
  string connection_string = 2;

  // Hostname for connecting (vtgate address).
  string host = 3;

  // Port number (3306).
  int32 port = 4;

  // Auto-generated username (prefix "u_" + 12 alphanumeric chars).
  string username = 5;

  // Auto-generated password (48 chars with special chars). Returned ONCE.
  string password = 6;

  // PEM-encoded CA certificate for TLS verification (base64).
  string ssl_ca_pem = 7;

  // Engine used ("mysql").
  string engine = 8;

  // Region where the database was provisioned.
  string region = 9;

  // Current status of the database.
  string status = 10;

  // Timestamp of creation (RFC 3339).
  string created_at = 11;
}

// ── DeleteDatabase ──────────────────────────────────────────────────────────

message DeleteDatabaseRequest {
  // ID of the database to delete.
  string database_id = 1;
}

message DeleteDatabaseResponse {
  // Whether the deletion succeeded.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

// ── ListDatabases ───────────────────────────────────────────────────────────

message ListDatabasesRequest {
  // Filter by user ID. Required.
  string user_id = 1;

  // Optional pagination: max results per page (default 50, max 100).
  int32 page_size = 2;

  // Optional pagination token from previous response.
  string page_token = 3;
}

message ListDatabasesResponse {
  // List of databases owned by the user.
  repeated Database databases = 1;

  // Token for the next page, empty if no more pages.
  string next_page_token = 2;

  // Total number of databases for this user.
  int32 total = 3;
}

// ── GetDatabase ─────────────────────────────────────────────────────────────

message GetDatabaseRequest {
  // ID of the database to retrieve.
  string database_id = 1;
}

message GetDatabaseResponse {
  // Database metadata (no credentials).
  Database database = 1;
}

// ── RotateCredentials ──────────────────────────────────────────────────────

message RotateCredentialsRequest {
  // ID of the database whose credentials to rotate.
  string database_id = 1;
}

message RotateCredentialsResponse {
  // Database ID.
  string database_id = 1;

  // New connection string with updated credentials.
  string connection_string = 2;

  // New username.
  string username = 3;

  // New password. Returned ONCE.
  string password = 4;

  // PEM-encoded CA certificate (base64).
  string ssl_ca_pem = 5;

  // Hostname.
  string host = 6;

  // Port.
  int32 port = 7;
}

// ── Shared Types ────────────────────────────────────────────────────────────

// Database metadata. Never contains credentials.
// SSL CA certificate is safe to include — it is the cluster-wide CA, not per-database.
message Database {
  // Unique ID (UUID v4).
  string database_id = 1;

  // Database name.
  string name = 2;

  // Engine ("mysql").
  string engine = 3;

  // Region ("nuremberg" or "helsinki").
  string region = 4;

  // Hostname for connections.
  string host = 5;

  // Port number.
  int32 port = 6;

  // Username (prefix "u_" prefix, credentials never returned here).
  string username = 7;

  // Status: "creating", "ready", "deleting", "deleted", "error".
  string status = 8;

  // Creation timestamp (RFC 3339).
  string created_at = 9;

  // PEM-encoded CA certificate for TLS verification (base64).
  // This is the cluster-wide VTGate CA, safe to include in metadata responses.
  string ssl_ca_pem = 10;
}

// ── IP Whitelist ────────────────────────────────────────────────────────────

// A single IP whitelist entry (CIDR range with description).
message IPWhitelistEntry {
  // CIDR notation, e.g. "192.168.1.0/24" or "10.0.0.1/32".
  string cidr = 1;

  // Human-readable label for this entry.
  string description = 2;

  // Timestamp of creation (RFC 3339).
  string created_at = 3;
}

message GetIPWhitelistRequest {
  // ID of the database.
  string database_id = 1;
}

message GetIPWhitelistResponse {
  // List of whitelist entries.
  repeated IPWhitelistEntry entries = 1;
}

message AddIPWhitelistEntryRequest {
  // ID of the database.
  string database_id = 1;

  // CIDR notation to whitelist.
  string cidr = 2;

  // Human-readable description.
  string description = 3;
}

message AddIPWhitelistEntryResponse {
  // The newly created entry (may be empty on error).
  IPWhitelistEntry entry = 1;
}

message RemoveIPWhitelistEntryRequest {
  // ID of the database.
  string database_id = 1;

  // CIDR to remove.
  string cidr = 2;
}

message RemoveIPWhitelistEntryResponse {
  // Whether the removal succeeded.
  bool success = 1;

  // Human-readable message.
  string message = 2;
}

// ── Usage & Tiers ──────────────────────────────────────────────────────────

message GetUsageRequest {
  // ID of the user whose usage to query.
  string user_id = 1;
}

message TierLimits {
  // Maximum number of databases (-1 = unlimited).
  int32 max_databases = 1;

  // Maximum storage in bytes (-1 = unlimited).
  int64 max_storage_bytes = 2;

  // Read units allowed per month (-1 = unlimited/burstable).
  int64 read_units_per_month = 3;

  // Write units allowed per month (-1 = unlimited/burstable).
  int64 write_units_per_month = 4;

  // Price per additional GB of storage per month (€0.20).
  double additional_storage_gb_price = 5;

  // Price per CU-hour for autoscale compute (€0.04).
  double autoscale_cu_price = 6;

  // Max CU this tier can autoscale to (-1 = unlimited, 0 = disabled).
  int32 autoscale_max_cu = 7;
}

message Usage {
  // Current number of databases.
  int32 database_count = 1;

  // Current storage used in bytes.
  int64 storage_bytes = 2;

  // Read units consumed this month.
  int64 read_units_used = 3;

  // Write units consumed this month.
  int64 write_units_used = 4;
}

message GetUsageResponse {
  // The user ID.
  string user_id = 1;

  // Current tier name (free, scale, team, business, enterprise).
  string tier = 2;

  // The limits for the current tier.
  TierLimits limits = 3;

  // Current usage.
  Usage usage = 4;
}

message SetUserTierRequest {
  // ID of the user to update.
  string user_id = 1;

  // Tier name to assign.
  string tier = 2;
}

message SetUserTierResponse {
  // Whether the operation succeeded.
  bool success = 1;
}

// ── ResizeStorage ────────────────────────────────────────────────────────────

message ResizeStorageRequest {
  // ID of the database whose PVC to resize.
  string database_id = 1;

  // GB to add to the current PVC (not the total new size).
  int32 additional_gb = 2;
}

message ResizeStorageResponse {
  // Whether the resize was accepted by the storage provider.
  bool success = 1;

  // New total PVC size in GB after the resize.
  int64 new_total_gb = 2;

  // Human-readable message (e.g. reason for failure).
  string message = 3;
}

// ── SetAutoscale ────────────────────────────────────────────────────────────

message SetAutoscaleRequest {
  // ID of the database to configure.
  string database_id = 1;

  // Enable or disable autoscale.
  bool enabled = 2;

  // Threshold percentage of PVC usage that triggers a resize (default 80).
  int32 threshold_percent = 3;

  // Percentage increment to add when threshold is hit (default 20).
  int32 increment_percent = 4;
}

message SetAutoscaleResponse {
  // Whether autoscale is currently enabled.
  bool enabled = 1;

  // Current threshold percentage.
  int32 threshold_percent = 2;

  // Current increment percentage.
  int32 increment_percent = 3;
}

// ── GetMetrics ──────────────────────────────────────────────────────────────

message GetMetricsRequest {
  // ID of the database to query metrics for.
  string database_id = 1;
}

message GetMetricsResponse {
  // List of data points collected over the last 24 hours.
  repeated MetricPoint points = 1;
}

message MetricPoint {
  // Unix timestamp of the measurement.
  int64 timestamp = 1;

  // CPU usage as a percentage (0-100). 0 if unavailable.
  double cpu_percent = 2;

  // Disk usage in GB.
  double disk_gb = 3;
}

// ── GetSSLCertificates ──────────────────────────────────────────────────────

message GetSSLCertificatesRequest {
  // ID of the database to retrieve SSL certificates for.
  string database_id = 1;
}

message GetSSLCertificatesResponse {
  // PEM-encoded CA certificate.
  string ca_cert = 1;

  // PEM-encoded client certificate.
  string client_cert = 2;

  // PEM-encoded client private key.
  string client_key = 3;
}
